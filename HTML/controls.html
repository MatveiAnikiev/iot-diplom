<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Элементы управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../normilize.css">
    <link rel="stylesheet" href="../navmenu.css">
    <link rel="stylesheet" href="../CSS/controls.css">
</head>

<body>
    <aside class="sidebar collapsed">
        <div class="sidebar_body">
            <button class="burger" type="button">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="sidebar_menu">
                <ul class="navmenu">
                    <li><a href="../index.html" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="layout-dashboard"></i>
                            </span>
                            <span class="nav_text">Главная</span>
                        </a></li>
                    <li><a href="#" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="chart-column-big"></i>
                            </span>
                            <span class="nav_text">Аналитика</span>
                        </a></li>
                    <li><a href="controls.html" class="nav_link active">
                            <span class="nav_icon">
                                <i data-lucide="square-power"></i>
                            </span>
                            <span class="nav_text">Элементы управлeния</span>
                        </a></li>
                    <li><a href="#" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="info"></i>
                            </span>
                            <span class="nav_text">Информация</span>
                        </a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <main class="content">

        <section class="led_kpi">
            <h2 class="led_title">LED Индикаторы</h2>
            <ul class="led_list">
                <li>
                    <div class="led_card">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_1</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator" id="led1_indicator"></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" id="led1_on">Включен</span>
                            <span class="led_stat" id="led1_off">Выключен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="led_card">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_2</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator" id="led2_indicator"></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" id="led2_on">Включен</span>
                            <span class="led_stat" id="led2_off">Выключен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="led_card">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_3</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator" id="led3_indicator"></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" id="led3_on">Включен</span>
                            <span class="led_stat" id="led3_off">Выключен</span>
                        </div>
                    </div>
                </li>
            </ul>
        </section>

        <section class="button_monitors">
            <h2 class="button_title">Состояние Тумблеров</h2>
            <ul class="button_list">
                <li>
                    <div class="button_card">
                        <div class="button_header">
                            <div class="button_icon" id="button_icon_1">
                                <span class="button_circle" id="circle_1"></span>
                                <span class="point" id="point_1"></span>
                            </div>
                            <h3 class="button_label">Тумблер 1</h3>
                        </div>
                        <div class="button_status" id="button_status_1">
                            <span class="button_state" id="button1_state_text">Неактивен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="button_card">
                        <div class="button_header">
                            <div class="button_icon" id="button_icon_2">
                                <span class="button_circle" id="circle_2"></span>
                            </div>
                            <h3 class="button_label">Тумблер 2</h3>
                        </div>
                        <div class="button_status" id="button_status_2">
                            <span class="button_state" id="button2_state_text">Неактивен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="button_card">
                        <div class="button_header">
                            <div class="button_icon" id="button_icon_3">
                                <span class="button_circle" id="circle_3"></span>
                            </div>
                            <h3 class="button_label">Тумблер 3</h3>
                        </div>
                        <div class="button_status" id="button_status_3">
                            <span class="button_state" id="button3_state_text">Неактивен</span>
                            
                        </div>
                    </div>
                </li>
            </ul>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="../JS/scripts.js"></script>
    <!-- Lucide icons inclussion -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
