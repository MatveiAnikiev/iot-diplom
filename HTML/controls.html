<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Элементы управления</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../normilize.css">
    <link rel="stylesheet" href="../navmenu.css">
    <link rel="stylesheet" href="../CSS/controls.css">
</head>

<body>
    <aside class="sidebar collapsed">
        <div class="sidebar_body">
            <button class="burger" type="button">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="sidebar_menu">
                <ul class="navmenu">
                    <li><a href="../index.html" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="layout-dashboard"></i>
                            </span>
                            <span class="nav_text">Главная</span>
                        </a></li>
                    <li><a href="analitics.html" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="chart-column-big"></i>
                            </span>
                            <span class="nav_text">Аналитика</span>
                        </a></li>
                    <li><a href="controls.html" class="nav_link active">
                            <span class="nav_icon">
                                <i data-lucide="square-power"></i>
                            </span>
                            <span class="nav_text">Элементы управлeния</span>
                        </a></li>
                    <li><a href="#" class="nav_link">
                            <span class="nav_icon">
                                <i data-lucide="info"></i>
                            </span>
                            <span class="nav_text">Информация</span>
                        </a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <main class="content">

        <section class="led_kpi">
            <h2 class="led_title">LED Индикаторы</h2>
            <ul class="led_list">
                <li>
                    <div class="led_card" data-led-key="LED1">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_1</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator"></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" data-led-state="on">Включен</span>
                            <span class="led_stat" data-led-state="off">Выключен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="led_card" data-led-key="LED2">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_2</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator"></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" data-led-state="on">Включен</span>
                            <span class="led_stat" data-led-state="off">Выключен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="led_card" data-led-key="LED3">
                        <div class="led_header">
                            <span class="led_icon">
                                <i data-lucide="lightbulb"></i>
                            </span>
                            <h3 class="led_label">LED_3</h3>
                        </div>
                        <div class="indicator_label">
                            <span class="system_indicator" ></span>
                        </div>
                        <div class="led_status">
                            <span class="led_stat" data-led-state="on">Включен</span>
                            <span class="led_stat" data-led-state="off">Выключен</span>
                        </div>
                    </div>
                </li>
            </ul>
        </section>

        <section class="button_monitors">
            <h2 class="button_title">Состояние Тумблеров</h2>
            <ul class="button_list">
                <li>
                    <div class="button_card" data-button-key="button1State">
                        <div class="button_header">
                            <div class="button_icon">
                                <span class="button_circle"></span>
                                <span class="point"></span>
                            </div>
                            <h3 class="button_label">Тумблер 1</h3>
                        </div>
                        <div class="button_status">
                            <span class="button_state">Неактивен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="button_card" data-button-key="button2State">
                        <div class="button_header">
                            <div class="button_icon" >
                                <span class="button_circle"></span>
                                <span class="point"></span>
                            </div>
                            <h3 class="button_label">Тумблер 2</h3>
                        </div>
                        <div class="button_status">
                            <span class="button_state">Неактивен</span>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="button_card" data-button-key="button3State">
                        <div class="button_header">
                            <div class="button_icon">
                                <span class="button_circle"></span>
                                <span class="point"></span>
                            </div>
                            <h3 class="button_label">Тумблер 3</h3>
                        </div>
                        <div class="button_status">
                            <span class="button_state">Неактивен</span>
                            
                        </div>
                    </div>
                </li>
            </ul>
        </section>
    </main>
    <script src="../JS/burger.js"></script>
    <script src="../JS/controls.js"></script>
    <!-- Lucide icons inclussion -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
